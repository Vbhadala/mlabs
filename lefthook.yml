# Pre-commit hooks. Install per-clone with: npx lefthook install
#
# The migration check enforces the Drizzle workflow: schema changes MUST come
# with a matching generated migration in drizzle/migrations/. Prevents the
# "works locally, breaks on deploy" footgun where someone edits schema and
# forgets `npm run db:generate`.
#
# Bypass an individual commit with `git commit --no-verify` (use sparingly —
# only for refactors that touch schema files but don't change DB shape).

pre-commit:
  parallel: true
  jobs:
    - name: check-migrations
      run: bash .lefthook/pre-commit/check-migrations.sh
    - name: check-mobile-tailwind
      glob: "{src/config/design.ts,mobile/tailwind.config.js,scripts/gen-mobile-tailwind.ts}"
      run: npm run gen:mobile-tw:check
