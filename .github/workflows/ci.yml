name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1
  # Turborepo Remote Cache — opt-in and inert until configured. Add repo secret
  # TURBO_TOKEN + repo variable TURBO_TEAM (Vercel Remote Cache or self-hosted)
  # and every job shares one cache across runners and PRs — the biggest CI-time
  # lever. Left empty, turbo falls back to the per-job local .turbo cache below.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-typecheck-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-typecheck-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-typecheck-
      - run: pnpm turbo run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-lint-
      - run: pnpm turbo run lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-test-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-test-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-test-
      - run: pnpm turbo run test

  lockfile-checks:
    # Dependency-version consistency (syncpack) + no-collapsible-duplicates
    # (pnpm dedupe --check). Both are lockfile / package.json lints, so they
    # share one workspace install instead of paying for it in two jobs.
    #
    # syncpack config in .syncpackrc.json carves out the deliberate divergences
    # (React 18/19 split, mobile's pinned TS 5.3 / eslint 8 / tailwind 3 during
    # the Phase 6 SDK upgrade window). dedupe --check fails when a dep resolved
    # at multiple compatible versions could collapse to one.
    name: lockfile-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm syncpack lint
      - run: pnpm dedupe --check

  bundle-scan:
    # Exports the mobile JS bundle and greps for server-only env names and
    # workspace package paths. The mobile bundle should never reference the
    # Postgres URL, Better Auth secret, the Postmark SDK, or any of the
    # server-only @mlabs/* packages — if a refactor accidentally pulls one
    # of those in through a shared module, this job fails the PR.
    name: bundle-scan (mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Export mobile JS bundle (iOS)
        run: pnpm --filter @mlabs/mobile exec expo export --platform ios --output-dir /tmp/expo-bundle
      - name: Scan bundle for forbidden server-only references
        run: |
          set -euo pipefail
          PATTERN='DATABASE_URL|BETTER_AUTH_SECRET|STRIPE_SECRET_KEY|POSTMARK_SERVER_TOKEN|postmark|@mlabs/db|@mlabs/services|@mlabs/email|@mlabs/auth/server|@mlabs/auth/jwt|@mlabs/api/server'
          if grep -rlE "$PATTERN" /tmp/expo-bundle/_expo; then
            echo "::error::Forbidden server-only references found in mobile bundle output (see matched files above)."
            exit 1
          fi
          echo "Bundle scan clean: no server-only references detected."
