# Maestro flow 4 — forgot password → tap reset link → set new password → login
appId: ${MAESTRO_APP_ID}
---
- launchApp:
    clearState: true
- tapOn: "Log in"
- tapOn: "Forgot password?"
- tapOn:
    id: "Email"
- inputText: "existing@example.com"
- tapOn: "Send reset link"
- assertVisible: "Check your email for the reset link."
# Synthesize reset universal link (test-only):
- openLink: "mlabs://reset-password?token=${RESET_TOKEN}"
- tapOn:
    id: "New password"
- inputText: "newsupersecret456"
- tapOn:
    id: "Confirm password"
- inputText: "newsupersecret456"
- tapOn: "Update password"
- assertVisible: "Welcome back"
- tapOn:
    id: "Email"
- inputText: "existing@example.com"
- tapOn:
    id: "Password"
- inputText: "newsupersecret456"
- tapOn: "Sign in"
- assertVisible:
    text: "Welcome"
    timeout: 5000
