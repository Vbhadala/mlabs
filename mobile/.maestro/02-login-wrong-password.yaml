# Maestro flow 2 — login with wrong password shows inline error
appId: ${MAESTRO_APP_ID}
---
- launchApp:
    clearState: true
- tapOn: "Log in"
- tapOn:
    id: "Email"
- inputText: "existing@example.com"
- tapOn:
    id: "Password"
- inputText: "wrongpassword"
- tapOn: "Sign in"
- assertVisible: "Wrong email or password."
