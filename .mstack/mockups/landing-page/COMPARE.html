<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tianjin landing page — variants</title>
  <style>
    :root {
      --ink: #0A0F1C;
      --muted: #5B6473;
      --border: #E6E4DF;
      --primary: #FF6B2C;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F5F4F0; color: var(--ink); font-family: -apple-system, "Inter", system-ui, sans-serif; }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 5;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    header .meta { font-size: 12px; color: var(--muted); }
    .controls { display: flex; gap: 8px; align-items: center; }
    .toggle {
      font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px;
      background: #fff; cursor: pointer; color: var(--ink); font-weight: 600;
    }
    .toggle.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      padding: 16px;
    }
    .col {
      background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
      box-shadow: 0 12px 30px -20px rgba(10,15,28,0.18);
    }
    .col header {
      position: static; padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; background: #fff;
    }
    .col h2 { margin: 0; font-size: 14px; font-weight: 700; }
    .col .tag {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--primary); font-weight: 700;
    }
    .frame-wrap {
      width: 100%;
      height: 78vh;
      background: #fafafa;
      overflow: hidden;
    }
    iframe { border: 0; width: 100%; height: 100%; display: block; background: #fff; }

    /* mobile mode */
    .mobile .frame-wrap { display: flex; justify-content: center; padding: 16px 0; background: #ECEAE4; }
    .mobile iframe { width: 390px; height: calc(78vh - 32px); border-radius: 16px; box-shadow: 0 20px 40px -20px rgba(10,15,28,0.3); }

    @media (max-width: 1000px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Tianjin — Landing page mockups</h1>
      <div class="meta">v1 Dark · v2 Light · Same content, same brand orange</div>
    </div>
    <div class="controls">
      <button id="btn-desktop" class="toggle active">Desktop</button>
      <button id="btn-mobile" class="toggle">Mobile (390px)</button>
    </div>
  </header>

  <div class="grid" id="grid">
    <div class="col">
      <header>
        <h2>v1 — Dark (MLabs canonical)</h2>
        <span class="tag">closest to millionlabs.com</span>
      </header>
      <div class="frame-wrap">
        <iframe src="./v1/index.html" title="v1 dark"></iframe>
      </div>
    </div>
    <div class="col">
      <header>
        <h2>v2 — Light (inverted, same brand)</h2>
        <span class="tag">friendlier B2B SaaS feel</span>
      </header>
      <div class="frame-wrap">
        <iframe src="./v2/index.html" title="v2 light"></iframe>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const desk = document.getElementById('btn-desktop');
    const mob  = document.getElementById('btn-mobile');
    desk.addEventListener('click', () => { grid.classList.remove('mobile'); desk.classList.add('active'); mob.classList.remove('active'); });
    mob .addEventListener('click', () => { grid.classList.add('mobile');    mob .classList.add('active'); desk.classList.remove('active'); });
  </script>
</body>
</html>
